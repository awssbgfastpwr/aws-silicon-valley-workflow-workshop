name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Markdown links
        run: python tools/check_markdown_links.py

      - name: Check public repository safety
        run: python tools/check_public_safety.py

  session-tests:
    name: Session tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - session: sessions/02-python-fastapi
            python-version: "3.13"
          - session: sessions/04-final-production-launch
            python-version: "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        working-directory: ${{ matrix.session }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        working-directory: ${{ matrix.session }}
        run: python -m pytest

